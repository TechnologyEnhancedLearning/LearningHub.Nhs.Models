name: Models Continuous Integration
on: [push]
jobs:
  build:
      env:
        BUILD_CONFIG: 'Release'
        DOTNET_ROLL_FORWARD: 'Major'
        SOLUTION: 'LearningHub.Nhs.Models.sln'
      name: Build and publish package
      runs-on: windows-latest
      strategy: 
          matrix:
           dotnet-version: ['6.0.x']
      steps:
        - uses: actions/checkout@v2
          with:
           fetch-depth: 0

        - name: Setup .NET Core SDK 60
          uses: actions/setup-dotnet@v1
          with:
            dotnet-version: ${{ matrix.dotnet-version }}

        - name: Install GitVersion
          uses: gittools/actions/gitversion/setup@v0.9.7
          with:
            versionSpec: '5.5.0'
            
        - name: Determine Version
          id:   gitversion
          uses: gittools/actions/gitversion/execute@v0.9.7

        - name: Display GitVersion outputs
          run: |
            echo "Major: ${{ steps.gitversion.outputs.major }}"
            echo "Minor: ${{ steps.gitversion.outputs.minor }}"
            echo "Patch: ${{ steps.gitversion.outputs.patch }}"
            echo "NuGetVersionV2: ${{ steps.gitversion.outputs.nuGetVersionV2 }}"

        - name: Build solution excluding SQL project
          run: |
            # List all .csproj files except for .sqlproj
            $csproj_files = Get-ChildItem -Path . -Filter *.LearningHub.Nhs.Models.csproj -Recurse 

            # Build each .csproj file
            foreach ($csproj_file in $csproj_files) {
              Write-Host "Building $($csproj_file.FullName)"
              dotnet build "$($csproj_file.FullName)"
              version=${{ steps.gitversion.outputs.nuGetVersionV2 }}-test
              dotnet pack "$($csproj_file.FullName)-test" --configuration Release -o:package /p:PackageVersion=$version
            }                   
   
