name: ${{ env.date:yyyyMMdd }}${{ env.rev:.r }}
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '6.0.x'  # Use the desired version

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet **/*.csproj --configuration ${{ env.BuildConfiguration }}

    - name: Test
      run: dotnet test --configuration $(BuildConfiguration)

    - name: Pack
      run: dotnet pack elfhHub.Nhs.Models/elfhHub.Nhs.Models.csproj LearningHub.Nhs.Models/LearningHub.Nhs.Models.csproj --no-build    
    
   
