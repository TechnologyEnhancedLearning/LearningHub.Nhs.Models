name: Models Continuous Integration
on: [push]
jobs:
  build:
    runs-on: windows-latest
    strategy: 
      matrix:
       dotnet-version: ['6.0.x']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup .NET Core SDK 60
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Build projects
      run: |
        dotnet build LearningHub.Nhs.Models/LearningHub.Nhs.Models.csproj -c Release
        dotnet build elfhHub.Nhs.Models/elfhHub.Nhs.Models.csproj -c Release

    - name: Publish packages to GitHub Registry
      run: |
        dotnet nuget add source https://nuget.pkg.github.com/TechnologyEnhancedLearning/index.json   --api-key ${{ secrets.GITHUB_TOKEN }} 

        dotnet nuget push "**/bin/Release/*.nupkg" --source github --skip-duplicate 
    
   
